services:
  # Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      cache_from:
        - hemaweb-web:latest
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://hemaweb.world/api}
        NEXT_PUBLIC_APP_NAME: HemaWeb
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://hemaweb.world}
    image: hemaweb-web:latest
    container_name: hemaweb-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://hemaweb.world/api}
      NEXT_PUBLIC_APP_NAME: HemaWeb
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://hemaweb.world}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`hemaweb.world`) || Host(`www.hemaweb.world`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=letsencrypt"
      - "traefik.http.services.web.loadbalancer.server.port=3000"
    networks:
      - hemaweb-network

  # API Backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      cache_from:
        - hemaweb-api:latest
    image: hemaweb-api:latest
    container_name: hemaweb-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://hemaweb.world}
      FRONTEND_URL: ${FRONTEND_URL:-https://hemaweb.world}
      # Email - Mailjet API
      MAILJET_API_KEY: ${MAILJET_API_KEY}
      MAILJET_SECRET_KEY: ${MAILJET_SECRET_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@hemaweb.world}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-HemaWeb}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=(Host(`hemaweb.world`) || Host(`www.hemaweb.world`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.services.api.loadbalancer.server.port=3001"
    networks:
      - hemaweb-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Traefik reverse proxy with automatic SSL
  traefik:
    image: traefik:v2.11
    container_name: hemaweb-traefik
    restart: unless-stopped
    command:
      - "--log.level=INFO"
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.letsencrypt.acme.tlschallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@hemaweb.world}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - hemaweb-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.hemaweb.world`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=dashboard-auth"
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

  # PostgreSQL with PostGIS extension
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hemaweb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hemaweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hemaweb_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hemaweb}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hemaweb} -d ${POSTGRES_DB:-hemaweb}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hemaweb-network

  # Redis for sessions and caching
  redis:
    image: redis:7-alpine
    container_name: hemaweb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hemaweb_redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hemaweb-network

  # pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: hemaweb-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@hemaweb.world}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-changeme}
      PGADMIN_CONFIG_SERVER_MODE: 'True'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.pgadmin.rule=Host(`pgadmin.hemaweb.world`)"
      - "traefik.http.routers.pgadmin.entrypoints=websecure"
      - "traefik.http.routers.pgadmin.tls.certresolver=letsencrypt"
      - "traefik.http.routers.pgadmin.middlewares=pgadmin-auth"
      - "traefik.http.middlewares.pgadmin-auth.basicauth.users=${TRAEFIK_DASHBOARD_AUTH}"
      - "traefik.http.services.pgadmin.loadbalancer.server.port=80"
    networks:
      - hemaweb-network
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  traefik_letsencrypt:
    driver: local
  pgadmin_data:
    driver: local

networks:
  hemaweb-network:
    driver: bridge

