version: '3.9'

# Production Docker Compose configuration for hemaweb.world
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  postgres:
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - /srv/hemaweb/data/postgres:/var/lib/postgresql/data
    networks:
      - hemaweb-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - /srv/hemaweb/data/redis:/data
    networks:
      - hemaweb-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # pgAdmin disabled in production
  pgadmin:
    profiles:
      - tools

networks:
  hemaweb-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:

