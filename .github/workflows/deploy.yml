name: Deploy to hemaweb.world

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H hemaweb.world >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh root@hemaweb.world << 'ENDSSH'
            set -e

            echo "Starting deployment..."
            cd /srv/hemaweb

            echo "Pulling latest code from GitHub..."
            git fetch origin
            git reset --hard origin/main
            git pull origin main

            echo "Rebuilding containers..."
            docker compose build web api

            echo "Restarting services..."
            docker compose up -d

            echo "Waiting for services to start..."
            sleep 15

            echo "Checking service status..."
            docker compose ps

            echo "Recent API logs..."
            docker compose logs api --tail 20

            echo "Deployment completed successfully!"
          ENDSSH

      - name: Verify deployment
        run: |
          ssh root@hemaweb.world << 'ENDSSH'
            cd /srv/hemaweb
            echo "=== Git Status ==="
            git log --oneline -3
            echo ""
            echo "=== Docker Services ==="
            docker compose ps
            echo ""
            echo "=== Database Status ==="
            docker compose exec -T postgres psql -U hemaweb -d hemaweb -c 'SELECT COUNT(*) as user_count FROM users;' || echo "Database query failed"
          ENDSSH

      - name: Notify on success
        if: success()
        run: echo "Deployment to hemaweb.world successful!"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment to hemaweb.world failed!"
