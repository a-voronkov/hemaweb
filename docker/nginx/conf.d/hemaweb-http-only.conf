# Temporary HTTP-only configuration (before SSL setup)
# This file will be replaced by hemaweb.conf after SSL certificates are obtained

server {
    listen 80;
    listen [::]:80;
    server_name hemaweb.world www.hemaweb.world;

    # Root directory for static files
    root /var/www/html;
    index index.html;

    # Allow Certbot challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Serve static page
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}

