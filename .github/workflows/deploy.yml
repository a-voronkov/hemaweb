name: Deploy to hemaweb.world

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Production
    runs-on: [self-hosted, hemaweb]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Pull latest changes
        run: |
          set -e
          echo "Pulling latest code..."
          git fetch origin
          git reset --hard origin/main

      - name: Copy environment file
        run: |
          set -e
          echo "Copying .env file from /srv/hemaweb..."
          if [ ! -f /srv/hemaweb/.env ]; then
            echo "WARNING: .env file not found in /srv/hemaweb!"
            exit 1
          fi
          cp /srv/hemaweb/.env .env
          echo ".env file copied successfully"

      - name: Build Docker images
        run: |
          set -e
          echo "Building Docker images..."
          docker compose build web api

      - name: Restart services
        run: |
          set -e
          echo "Restarting services..."
          docker compose up -d --remove-orphans

      - name: Wait for services
        run: |
          echo "Waiting for services to start..."
          sleep 15

      - name: Restart traefik to ensure connectivity
        run: |
          echo "Restarting traefik..."
          docker compose restart traefik
          sleep 5

      - name: Check service status
        run: |
          echo "Checking service status..."
          docker compose ps

      - name: Show recent logs
        if: always()
        run: |
          echo "Recent API logs:"
          docker compose logs api --tail 20
          echo ""
          echo "Recent Web logs:"
          docker compose logs web --tail 20

      - name: Verify database
        run: |
          echo "Verifying database connection..."
          docker compose exec -T postgres psql -U hemaweb -d hemaweb -c 'SELECT COUNT(*) as user_count FROM users;' || echo "WARNING: Database query failed"

      - name: Deployment summary
        if: always()
        run: |
          echo "Deployment Summary"
          echo "===================="
          git log --oneline -3
          echo ""
          docker compose ps

      - name: Notify on success
        if: success()
        run: echo "Deployment to hemaweb.world successful!"

      - name: Notify on failure
        if: failure()
        run: echo "Deployment to hemaweb.world failed!"
