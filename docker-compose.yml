services:
  # Frontend (Next.js)
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      cache_from:
        - hemaweb-web:latest
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://hemaweb.world/api}
        NEXT_PUBLIC_APP_NAME: HemaWeb
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://hemaweb.world}
    image: hemaweb-web:latest
    container_name: hemaweb-web
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://hemaweb.world/api}
      NEXT_PUBLIC_APP_NAME: HemaWeb
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://hemaweb.world}
    networks:
      - hemaweb-network

  # API Backend
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      cache_from:
        - hemaweb-api:latest
    image: hemaweb-api:latest
    container_name: hemaweb-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://hemaweb.world}
      FRONTEND_URL: ${FRONTEND_URL:-https://hemaweb.world}
    networks:
      - hemaweb-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: hemaweb-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/html:/var/www/html:ro
      - ./docker/certbot/conf:/etc/letsencrypt:ro
      - ./docker/certbot/www:/var/www/certbot:ro
    networks:
      - hemaweb-network
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started

  # Certbot for SSL certificates
  certbot:
    image: certbot/certbot
    container_name: hemaweb-certbot
    volumes:
      - ./docker/certbot/conf:/etc/letsencrypt
      - ./docker/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    profiles:
      - ssl

  # PostgreSQL with PostGIS extension
  postgres:
    image: postgis/postgis:16-3.4
    container_name: hemaweb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hemaweb}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hemaweb_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-hemaweb}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hemaweb} -d ${POSTGRES_DB:-hemaweb}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hemaweb-network

  # Redis for sessions and caching
  redis:
    image: redis:7-alpine
    container_name: hemaweb-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-hemaweb_redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hemaweb-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  hemaweb-network:
    driver: bridge

